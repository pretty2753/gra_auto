# =======================================================================
#  prometheus가 slack / discord / fastapi 등으로 보내는 알람을 관리하는 yml
# =======================================================================
groups:
  # ============================================================
  #  Recording Rules (현재값 / 예측값 미리 계산)
  # ============================================================
  - name: node_usage_recording
    interval: 30s
    rules:
    # cpu
      - record: present_average_cpu
        expr: 100 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100

      - record: future_average_cpu
        expr: predict_linear(present_average_cpu[30m:], 5 * 60)

    # memory
      - record: present_average_memory
        expr: avg((1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100)

      - record: future_average_memory
        expr: predict_linear(present_average_memory[30m:], 5 * 60)

  # ============================================================
  #  예측 + 현재값 알람 (현재값 OR 5분 후 예측값)
  #  - LEVEL 1: 50% 초과 ~ 60% 이하 / 5분 지속 → scale out
  #  - LEVEL 2: 60% 초과 ~ 75% 이하 / 3분 지속 → scale out
  # ============================================================
  - name: node_predict_alerts
    interval: 30s
    rules:
      # ---------- LEVEL 1: 50 < x <= 60 ----------
      - alert: Level1-cpu
        expr: |
          (
            (present_average_cpu > 50 and present_average_cpu <= 60)
            or
            (future_average_cpu  > 50 and future_average_cpu  <= 60)
          )
          unless
          (present_average_cpu > 60 or future_average_cpu > 60)
        for: 5m
        labels:
          severity: warning
          level: "1"
          action: scale_out

      - alert: Level1-memory
        expr: |
          (
            (present_average_memory > 50 and present_average_memory <= 60)
            or
            (future_average_memory  > 50 and future_average_memory  <= 60)
          )
          unless
          (present_average_memory > 60 or future_average_memory > 60)
        for: 5m
        labels:
          severity: warning
          level: "1"
          action: scale_out
     # ---------- LEVEL 2: 60 < x <= 75 ----------
      - alert: Level2-cpu
        expr: |
          (present_average_cpu > 60 and present_average_cpu <= 75)
          or
          (future_average_cpu  > 60 and future_average_cpu  <= 75)
        for: 3m
        labels:
          severity: warning
          level: "2"
          action: scale_out

      - alert: Level2-memory
        expr: |
          (present_average_memory > 60 and present_average_memory <= 75)
          or
          (future_average_memory  > 60 and future_average_memory  <= 75)
        for: 3m
        labels:
          severity: warning
          level: "2"
          action: scale_out
  # ============================================================
  #  정상화 알람 (scale in 트리거)
  #  - CPU/메모리 모두 50% 이하로 5분 이상 지속 시 발동
  # ============================================================
  - name: Normarlized-cpu
    interval: 30s
    rules:
      - alert: CPUNormalized
        expr: |
          (present_average_cpu <= 50)
          and
          (future_average_cpu  <= 50)
        for: 5m
        labels:
          action: scale_in

      - alert: Normalized-memory
        expr: |
          (present_average_memory <= 50)
          and
          (future_average_memory  <= 50)
        for: 5m
        labels:
          action: scale_in
  # ============================================================
  # 1. EC2 인스턴스 다운 감지
  #    - node_exporter가 일정 시간 응답 없으면 down 처리
  #    - Auto Scaling Group 재기동 / 인스턴스 교체 트리거용
  # ============================================================
  - name: ec2_instance_down
    interval: 30s
    rules:

      - alert: Instance-down
        expr: up{job="node_exporter"} == 0
        for: 2m
        labels:
          action: Aiops_instance_down


      - alert: Instance-unreachable
        expr: absent(up{job="node_exporter"}) == 1
        for: 2m
        labels:
          action: Aiops_instance_unreachable
  # ============================================================
  # 2. 배포 후 에러율 급증 → 이전 버전으로 롤백
  #    - HTTP 5xx 비율이 임계치 초과 시 롤백 트리거
  #    - FastAPI / nginx exporter 메트릭 기반
  # ============================================================
  - name: Deploy-rollback
    interval: 30s
    rules:
      - record: http_error_ratio
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[2m]))
          /
          sum(rate(http_requests_total[2m]))

      - alert: Aiops_HighErrorRateAfterDeploy
        expr: http_error_ratio > 0.1
        for: 2m
        labels:
          action: Aiops_rollback

      - alert: CriticalErrorRateAfterDeploy
        expr: http_error_ratio > 0.3
        for: 1m
        labels:
          action: Aiops_rollback
  # ============================================================
  # 3. DB 연결 실패 / DB 오류 → DB 재시작
  #  postgres_exporter
  # ============================================================
  - name: db_connection_alerts
    interval: 30s
    rules:
      # DB exporter 자체가 죽은 경우 (DB down 추정)
      - alert: DB-down
        expr: up{job=~"mysql_exporter|postgres_exporter"} == 0
        for: 1m
        labels:
          action: Aiops_db_connect_failure

      # 앱에서 DB 커넥션 실패가 지속적으로 발생
      - alert: Db-non-connect
        expr: rate(db_connection_errors_total[2m]) > 5
        for: 2m
        labels:
          action: Aiops_db_connect_failure
    # ============================================================
  # 4. CPU / Memory 스파이크 (순간 급등)
  #    - 기존 Level1/2는 "지속" 기반
  #    - 여기서는 단시간 급등(스파이크) 별도 감지
  # ============================================================
  - name: resource_spike_alerts
    interval: 15s
    rules:
  # 30초 사이에 특정 EC2 한 대라도 CPU / 메모리 90% 초과
      - alert: Cpu-spike
        expr: instance:cpu_usage > 90
        for: 30s
        labels:
          action: Aiops_cpu_spike

      - alert: Memory-spike
        expr: instance:memory_usage > 90
        for: 30s
        labels:
          action: Aiops_memory_spike

    # 30초 사이 특정 인스턴스에서 40%p 이상 급등
      - alert: Cpu-rush
        expr: (instance:cpu_usage - instance:cpu_usage offset 1m) > 40
        for: 30s
        labels:
          action: Aiops_cpu_rush

      - alert: Memory-rush
        expr: (instance:memory_usage - instance:memory_usage offset 1m) > 40
        for: 30s
        labels:
          action: Aiops_memory_rush
