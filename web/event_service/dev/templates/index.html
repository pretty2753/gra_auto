<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트 당첨 조회</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        #result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>이벤트 당첨 조회</h1>

    <input type="text" id="name" placeholder="이름 입력">
    <input type="text" id="receipt_no" placeholder="접수번호 입력">

    <button onclick="checkWinner()">조회하기</button>

    <div id="result"></div>
</div>

<script>
async function checkWinner() {

    const name = document.getElementById("name").value;
    const receipt_no = document.getElementById("receipt_no").value;

    const response = await fetch("/check", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            receipt_no: receipt_no
        })
    });

    const data = await response.json();

    const resultDiv = document.getElementById("result");

    if (data.success) {
        resultDiv.innerHTML = `
            <h2>${data.result}</h2>
            <p>이름: ${data.name}</p>
            <p>접수번호: ${data.receipt_no}</p>
        `;
    } else {
        resultDiv.innerHTML = `
            <p style="color:red;">
                ${data.message}
            </p>
        `;
    }
}
</script>

</body>
</html>
