# -------------------------------------------------
# Grafana Datasource Provisioning
#
# Grafana가 시작될 때 자동으로
# Prometheus를 데이터소스(Data Source)로 등록
#
# 수동으로
# Grafana UI → Connections → Data Sources
# 에서 등록할 필요 없음
# -------------------------------------------------

apiVersion: 1

datasources:

  # -------------------------------------------------
  # Prometheus 데이터소스
  # -------------------------------------------------
  - name: Prometheus

    # 데이터소스 종류
    type: prometheus

    # Grafana 서버를 통해 접근
    #
    # Browser:
    # 사용자의 브라우저가 직접 Prometheus 접근
    #
    # Proxy:
    # Grafana 서버가 대신 Prometheus 접근
    #
    # 일반적으로 Proxy 사용
    access: proxy

    # Docker Network 내부 Prometheus 주소
    #
    # docker-compose에서 지정한
    # 컨테이너 이름(prometheus)을 DNS처럼 사용
    #
    # 실제 통신:
    # Grafana → Prometheus
    url: http://prometheus:9090

    # 기본 데이터소스로 설정
    isDefault: true

    # Grafana UI에서 수정 가능 여부
    editable: true