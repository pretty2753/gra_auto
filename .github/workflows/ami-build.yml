name: "AMI Build"

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ami-build
  cancel-in-progress: false

jobs:
  build_ami:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3.1.0
        with:
          version: "1.11.2"

      - name: Packer Init
        working-directory: packer
        run: packer init .

      - name: Packer Validate
        working-directory: packer
        run: packer validate .

      - name: Packer Build
        working-directory: packer
        run: packer build . 2>&1 | tee packer-output.log

      - name: Debug Packer Output
        if: always()
        working-directory: packer
        run: |
          echo "=== Packer 로그 마지막 30줄 ==="
          tail -30 packer-output.log || echo "로그 파일 없음"

      - name: Extract AMI ID
        id: ami
        working-directory: packer
        run: |
          AMI_ID=$(jq -r '.builds[-1].artifact_id' manifest.json | cut -d: -f2)
          if [ -z "$AMI_ID" ]; then
            echo "::error::AMI ID 추출 실패"
            exit 1
          fi
          echo "ami_id=$AMI_ID" >> $GITHUB_OUTPUT
          echo "✅ 생성된 AMI ID: $AMI_ID"

