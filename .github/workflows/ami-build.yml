name: "AMI Build"

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ami-build
  cancel-in-progress: false

jobs:
  build_ami:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3.1.0
        with:
          version: "1.11.2"

      - name: Packer Init
        working-directory: packer
        run: packer init .

      - name: Packer Validate
        working-directory: packer
        run: packer validate .

      - name: Packer Build
        working-directory: packer
        run: packer build . 2>&1 | tee packer-output.log

      - name: Debug Packer Output
        if: always()
        working-directory: packer
        run: |
          echo "=== Packer 로그 마지막 30줄 ==="
          tail -30 packer-output.log || echo "로그 파일 없음"

      - name: Extract AMI ID
        id: ami
        working-directory: packer
        run: |
          AMI_ID=$(jq -r '.builds[-1].artifact_id' manifest.json | cut -d: -f2)
          if [ -z "$AMI_ID" ]; then
            echo "::error::AMI ID 추출 실패"
            exit 1
          fi
          echo "ami_id=$AMI_ID" >> $GITHUB_OUTPUT
          echo "✅ 생성된 AMI ID: $AMI_ID"

      - name: Update Terraform tfvars
        run: |
          AMI_ID="${{ steps.ami.outputs.ami_id }}"
          FILE="terraform/envs/dev/ami.auto.tfvars"

          touch $FILE
          sed -i "/^ami_id/d" $FILE
          echo "ami_id = \"${AMI_ID}\"" >> $FILE

          echo "📝 업데이트된 tfvars:"
          cat $FILE

      - name: Commit AMI ID
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add terraform/envs/dev/ami.auto.tfvars

          if git diff --cached --quiet; then
            echo "변경사항 없음. 커밋 스킵."
          else
            git commit -m "ci: update AMI ID to ${{ steps.ami.outputs.ami_id }} [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
            echo "✅ AMI ID 커밋 완료"
          fi
