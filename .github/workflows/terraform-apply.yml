name: Terraform Apply

on:
  push:
    branches:
      - main

jobs:
  terraform-apply:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: ./terraform/envs/dev

    steps:
      - uses: actions/checkout@v4

      - name: Terraform Apply
        run: |
          terraform init
          terraform apply -auto-approve