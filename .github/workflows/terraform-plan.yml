name: Terraform Plan & Scan

on:
  pull_request:
    paths:
      - 'terraform/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    runs-on: self-hosted
    env:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
      TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}

    env:
      TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
      TF_VAR_db_user:            ${{ secrets.DB_USER }}
      TF_VAR_db_password:        ${{ secrets.DB_PASSWORD }}

    defaults:
      run:
        working-directory: ./terraform/envs/dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'terraform'
          format: 'table'
          output: 'trivy-report.txt' 
          hide-progress: false

      - name: Show Trivy Output
        run: cat ${{ github.workspace }}/trivy-report.txt

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        shell: bash
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            exit ${PIPESTATUS[0]}
          fi

      - name: Terraform show JSON
        run: terraform show -json tfplan > plan.json

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Run Infracost
        run: |
          infracost breakdown --path plan.json --format table --out-file infracost-report.txt
          cat infracost-report.txt

      - name: Generate Discord Message
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        run: |
            cat > discord-message.md <<EOF
            ### 🔍 인프라 사전 검증 리포트
            
            #### 💵 예상 월 비용
            EOF
            
            grep -E "OVERALL TOTAL|Total Monthly" infracost-report.txt | head -3 >> discord-message.md || echo "(비용 정보 없음)" >> discord-message.md
            
            cat >> discord-message.md <<EOF
            
            #### 🛡️ 보안 스캔 결과
            EOF
            
            CRITICAL=$(grep -c "CRITICAL:" ${{ github.workspace }}/trivy-report.txt 2>/dev/null || echo 0)
            HIGH=$(grep -c "HIGH:" ${{ github.workspace }}/trivy-report.txt 2>/dev/null || echo 0)
            MEDIUM=$(grep -c "MEDIUM:" ${{ github.workspace }}/trivy-report.txt 2>/dev/null || echo 0)
            
            echo "- CRITICAL: $CRITICAL" >> discord-message.md
            echo "- HIGH: $HIGH" >> discord-message.md
            echo "- MEDIUM: $MEDIUM" >> discord-message.md
            
            echo "" >> discord-message.md
            echo "상세 내용: [GitHub Actions 로그 확인](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> discord-message.md
            
            echo "=== 생성된 메시지 ==="
            cat discord-message.md

      - name: Send Discord Notification
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        run: |
          MESSAGE=$(cat discord-message.md)
          jq -n --arg msg "$MESSAGE" '{"content": $msg}' > discord-payload.json
          
          curl -s -H "Content-Type: application/json" \
            -X POST \
            -d @discord-payload.json \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Post Plan & Cost to PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/envs/dev/plan-output.txt', 'utf8');
            const cost = fs.readFileSync('terraform/envs/dev/infracost-report.txt', 'utf8');
            
            const output = `## 인프라 변경 사전 검증 리포트\n### Infracost 예상 비용\n\`\`\`text\n${cost}\n\`\`\`\n### Terraform Plan 상세 내역\n<details><summary>Plan 결과 전개</summary>\n\n\`\`\`text\n${plan}\n\`\`\`\n\n</details>`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
