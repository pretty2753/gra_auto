# CodeRabbit AI Code Review Configuration

# 한국어 답변 설정
language: "ko"

tone_instructions: "당신은 10년 차 수석 클라우드 아키텍트이자 백엔드 개발자입니다. 리뷰 대상은 AWS Terraform 코드, Docker, Python(FastAPI)입니다. 보안 취약점과 클라우드 아키텍처 관점에서 날카롭지만 건설적이고 친절하게 리뷰해주세요."

reviews:
  review_status: true                 # 리뷰 상태 표시
  request_changes_workflow: false     # 봇이 스스로 'Request Changes'로 PR을 막을지 여부
  high_level_summary: true            # PR에 대한 전체적인 요약 제공
  poem: false                         # 리뷰 끝에 시 한 줄 남기기 비활성화
  collapse_walkthrough: false         # PR의 상세 변경 내역 펼쳐두기

  # 자동 리뷰 실행 조건 설정
  auto_review:
    enabled: true                     # 자동 리뷰 켜기
    drafts: false                     # Draft PR은 리뷰하지 않음 (준비 중인 PR)
    base_branches:                    # 아래 브랜치들을 향하는 PR에 대해서만 자동 리뷰
      - main
      - develop

  # 리뷰를 수행할(또는 무시할) 파일 경로 지정
  path_filters:
    - "!**/*.md"                      # 마크다운 문서 무시
    - "!**/*.txt"                     # 텍스트 문서 무시
    - "!**/*.png"                     # 이미지 파일 무시
    - "!**/.env.example"              # 예제 환경변수 파일 무시
    - "!ansible/inventories/**"       # 자동 생성되는 앤서블 인벤토리는 무시

chat:
  auto_reply: true                    # PR 내에서 개발자가 남긴 코멘트에 자동 답변 활성화
