---
- name: "adreamin 계정 생성"
  user:
    name: adreamin
    shell: /bin/bash
    groups: "{{ 'wheel' if ansible_os_family == 'RedHat' else 'sudo' }}" # RedHat/Amazon Linux 계열은 wheel, Ubuntu/Debian 계열은 sudo
    append: yes
    create_home: yes
    state: present

- name: "adreamin sudo 권한 설정"
  copy:
    dest: "/etc/sudoers.d/adreamin"
    content: "adreamin ALL=(ALL) NOPASSWD: ALL"
    mode: "0440"

- name: "local .ssh폴더 생성"
  file:
    path: "{{ lookup('env', 'HOME') }}/.ssh"
    state: directory # state 키값이 멱등성을 보장
    mode: "0700"

- name: "bastion keygen" # ssh keygen 자체로 public = 644, private = 600으로 권한을 줌
  delegate_to: localhost # 키 값을 줌으로서 ec2가 아닌 local에 실행됨
  run_once: true # 현재 hosts: all이라서 한번만 keygen할 수 있게 설정
  become: no # sudo 안쓰기
  command: >
    ssh-keygen -t rsa -b 4096
    -f {{ lookup('env', 'HOME') }}/.ssh/bastion-key.pem
    -C "bastion-key"
    -N ""
  args: # 이미 있다면 생성하지않기
    creates: "{{ lookup('env', 'HOME') }}/.ssh/bastion-key.pem"

- name: "ansible keygen"
  delegate_to: localhost
  run_once: true
  become: no 
  command: >
    ssh-keygen -t rsa -b 4096
    -f {{ lookup('env', 'HOME') }}/.ssh/ansible-key.pem
    -C "ansible-key"
    -N ""
  args:
    creates: "{{ lookup('env', 'HOME') }}/.ssh/ansible-key.pem"

- name: "adreamin .ssh폴더 생성"
  file:
    path: /home/adreamin/.ssh
    state: directory
    owner: adreamin
    group: adreamin
    mode: "0700"

- name: "bastion 공개키 등록"
  authorized_key:
    user: adreamin
    state: present
    key: "{{ lookup('file', '~/.ssh/bastion-key.pem.pub') }}"
  when: "'bastion' in group_names"

- name: "was & db 공개키 등록"
  authorized_key:
    user: adreamin
    state: present
    key: "{{ lookup('file', '~/.ssh/ansible-key.pem.pub') }}"
  when: "'was' in group_names or 'db' in group_names"