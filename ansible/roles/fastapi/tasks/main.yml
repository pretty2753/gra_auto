---
- name: Install packages
  dnf:
    name:
      - python3-pip
      - rsync
    state: present

- name: Create app directory
  file:
    path: "{{ app_root }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Allow nginx to access app home
  file:
    path: "/home/{{ app_user }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

# ==================================================
# 1. CODE DEPLOY (재배포 핵심)
# ==================================================
- name: Deploy FastAPI source
  copy:
    src: "{{ local_app_path }}/deploy/"
    dest: "{{ app_root }}/"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0644'
    directory_mode: '0755'
  register: app_copy

- name: Create FastAPI config directory
  file:
    path: /etc/fastapi
    state: directory
    owner: root
    group: root
    mode: '0755'
    
- name: Set env file
  template:
    src: env.j2
    dest: /etc/fastapi/.env
  vars:
    db_ip: "{{ hostvars['db01']['ansible_host'] }}"  

# ==================================================
# 2. VENV (최초 1회만 생성)
# ==================================================
- name: Create virtual environment
  command:
    cmd: "python3 -m venv {{ venv_dir }}"
    creates: "{{ venv_dir }}/bin/activate"
  register: venv_created

# ==================================================
# 3. PIP UPGRADE (최초만)
# ==================================================
- name: Upgrade pip
  pip:
    name: pip
    state: latest
    virtualenv: "{{ venv_dir }}"
  when: venv_created.changed

# ==================================================
# 4. REQUIREMENTS (코드 변경 시만)
# ==================================================
- name: Install python packages
  pip:
    requirements: "{{ app_root }}/requirements.txt"
    virtualenv: "{{ venv_dir }}"
  when: app_copy.changed or venv_created.changed

# ==================================================
# 5. SYSTEMD SERVICE (최초 또는 변경 시)
# ==================================================
- name: Install systemd service
  template:
    src: fastapi.service.j2
    dest: /etc/systemd/system/fastapi.service
  register: systemd_file

# ==================================================
# 6. SYSTEMD RELOAD (변경 시만)
# ==================================================
- name: Reload systemd
  systemd:
    daemon_reload: yes
  when: systemd_file.changed

# ==================================================
# 7. ENABLE (최초만 안전하게 반복 실행 가능)
# ==================================================
- name: Enable FastAPI service
  systemd:
    name: fastapi
    enabled: yes

# ==================================================
# 8. RESTART (진짜 변경 있을 때만)
# ==================================================
- name: Restart FastAPI
  systemd:
    name: fastapi
    state: restarted
  when: app_copy.changed or systemd_file.changed



