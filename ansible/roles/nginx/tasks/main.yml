---
- name: Install nginx
  package:
    name: nginx
    state: present

- name: Create nginx log directory
  file:
    path: /var/log/nginx/event_service
    state: directory
    owner: nginx
    group: nginx
    mode: '0755'    

- name: Deploy nginx config
  template:    
    src: event_service.conf.j2
    dest: /etc/nginx/conf.d/event_service.conf
  notify: 
    - validate nginx config
    - restart nginx  
  # template:
  #   src: nginx.conf.j2
  #   dest: /etc/nginx/nginx.conf    
  # notify: restart nginx

- name: Enable nginx
  systemd:
    name: nginx
    enabled: yes
    state: started